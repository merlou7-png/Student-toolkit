<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slgehmr | Shoe Store</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #e67e22;
            --bg: #f9f9f9;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px; 
            background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 10px; z-index: 100;
        }

        .logo { 
            font-size: 28px; font-weight: 900; color: var(--primary); 
            text-decoration: none; text-transform: uppercase; letter-spacing: 2px;
        }

        .search-box { padding: 12px; width: 100%; max-width: 300px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .search-box:focus { border-color: var(--accent); }

        .catalog { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center;
            transition: transform 0.2s;
            display: flex; flex-direction: column;
            justify-content: space-between;
        }
        .card:hover { transform: translateY(-5px); }

        .card img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }
        .card h3 { margin: 10px 0 5px; font-size: 1.1em; text-transform: capitalize; }
        .price { font-weight: bold; color: var(--accent); font-size: 1.3em; margin: 10px 0; }

        .btn { 
            background: var(--primary); color: white; border: none; 
            padding: 12px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: var(--accent); }

        .cart-section { background: white; padding: 30px; border-radius: 15px; margin-top: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        
        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 32px; height: 32px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 50%; font-weight: bold; }
        .remove-btn { color: #ff4757; cursor: pointer; margin-left: 20px; border: none; background: none; font-size: 1.2em; }

        .order-form { display: grid; gap: 15px; max-width: 450px; margin-top: 30px; }
        .order-form input { padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }

        .hidden { display: none; }
        .empty-msg { text-align: center; padding: 50px; color: #95a5a6; font-size: 1.1em; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="showCatalog(event)">Slgehmr</a>
    <input type="text" id="searchInput" class="search-box" placeholder="Найти кроссовки...">
    <button class="btn" onclick="showCart()">🛒 Корзина (<span id="cartCount">0</span>)</button>
</header>

<main id="catalogView">
    <div class="catalog" id="productGrid"></div>
</main>

<section id="cartView" class="cart-section hidden">
    <h2>Ваша корзина</h2>
    <div id="cartList"></div>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    <h3>Общая стоимость: <span id="totalPrice">0</span> ₸</h3>
    
    <div id="checkoutArea">
        <form id="orderForm" class="order-form" onsubmit="handleOrder(event)">
            <input type="text" id="name" placeholder="Имя Фамилия" required>
            <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required>
            <input type="text" id="address" placeholder="Город, улица, дом" required>
            <button type="submit" class="btn" style="background: var(--accent);">Оформить заказ</button>
        </form>
    </div>
    
    <button class="btn" onclick="showCatalog(event)" style="background:#7f8c8d; margin-top: 25px;">
        ← Вернуться к покупкам
    </button>
</section>

<script>
    const products = [
        { id: 1, name: "", price: 35000, image: "C:/Users/dwekf/Desktop/img/orig (5).webp"},
        { id: 2, name: "", price: 25000, image: "C:/Users/dwekf/Desktop/img/7379877692.jpg"},
        { id: 3, name: "", price: 30000, image: "C:/Users/dwekf/Desktop/img/6049348859.jpg"},
        { id: 4, name: "", price: 25000, image: "C:/Users/dwekf/Desktop/img/orig (3).webp"},
        { id: 5, name: "", price: 35000, image: "C:/Users/dwekf/Desktop/img/6973477491.jpg"},
        { id: 6, name: "", price: 250000, image: "C:/Users/dwekf/Desktop/img/i (3).webp"},

    ];

    let cart = JSON.parse(localStorage.getItem('slgehmr_shoes_cart')) || [];

    function renderProducts(data) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = data.map(p => `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <div>
                    <h3>${p.name}</h3>
                    <p style="font-size: 0.85em; color: #7f8c8d;">${p.desc}</p>
                    <div class="price">${p.price.toLocaleString()} ₸</div>
                </div>
                <button class="btn" onclick="addToCart(${p.id})">Купить</button>
            </div>
        `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        renderProducts(products.filter(p => p.name.toLowerCase().includes(val) || p.desc.toLowerCase().includes(val)));
    });

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        update();
    }

    function changeQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
        }
        update();
    }

    function deleteItem(id) {
        cart = cart.filter(i => i.id !== id);
        update();
    }

    function update() {
        localStorage.setItem('slgehmr_shoes_cart', JSON.stringify(cart));
        const list = document.getElementById('cartList');
        const count = document.getElementById('cartCount');
        const total = document.getElementById('totalPrice');
        const checkout = document.getElementById('checkoutArea');

        count.innerText = cart.reduce((acc, i) => acc + i.quantity, 0);
        
        if (cart.length === 0) {
            list.innerHTML = '<div class="empty-msg">Ваша корзина пуста. Время выбрать новую пару!</div>';
            checkout.classList.add('hidden');
        } else {
            list.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <span><strong>${i.name}</strong></span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${i.id}, -1)">-</button>
                        <span>${i.quantity}</span>
                        <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                        <span style="min-width: 80px; text-align: right;">${(i.price * i.quantity).toLocaleString()} ₸</span>
                        <button class="remove-btn" onclick="deleteItem(${i.id})">✕</button>
                    </div>
                </div>
            `).join('');
            checkout.classList.remove('hidden');
        }
        
        total.innerText = cart.reduce((acc, i) => acc + (i.price * i.quantity), 0).toLocaleString();
    }

    function showCatalog(e) {
        if(e) e.preventDefault();
        document.getElementById('catalogView').classList.remove('hidden');
        document.getElementById('cartView').classList.add('hidden');
        window.scrollTo(0, 0);
    }

    function showCart() {
        document.getElementById('catalogView').classList.add('hidden');
        document.getElementById('cartView').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function handleOrder(e) {
        e.preventDefault();
        const userName = document.getElementById('name').value;
        alert(`${userName}, ваш заказ в магазине Slgehmr принят! Мы скоро перезвоним.`);
        cart = [];
        update();
        showCatalog();
        e.target.reset();
    }

    renderProducts(products);
    update();
</script>

</body>
</html>
